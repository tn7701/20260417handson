{% extends "base.html" %}
{% block content %}
<div class="card">
  <header class="card-header">
    <h2>ポモドーロタイマー</h2>
  </header>
  <div class="timer-wrap">
    <div class="timer-status" id="status">準備中</div>
    <div id="timer" class="timer-center">
      <svg viewBox="0 0 100 100" class="progress-ring" width="200" height="200" aria-hidden="true">
        <circle cx="50" cy="50" r="45" class="bg" />
        <circle cx="50" cy="50" r="45" class="progress" />
      </svg>
      <div class="time" id="time" role="timer" aria-live="polite">25:00</div>
    </div>
  </div>
  <div class="controls">
    <button id="startBtn" class="btn-primary">開始</button>
    <button id="resetBtn" class="btn-outline">リセット</button>
  </div>

  <div class="stats-card" aria-hidden="false">
    <div class="stats-title">今日の進捗</div>
    <div class="stats-body">
      <div class="stat">
        <div class="num" id="today-count">0</div>
        <div class="label">完了</div>
      </div>
      <div class="stat">
        <div class="num" id="today-total">0分</div>
        <div class="label">集中時間</div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
